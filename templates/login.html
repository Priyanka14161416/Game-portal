{% extends "base.html" %}
{% block content %}

<style>

body{
    margin: 0;
    padding: 0;

    /* 🎮 Gaming Background (Blur + Dark Overlay) */
    background-image: url('https://images.unsplash.com/photo-1605902711622-cfb43c4437b5?q=80&w=2070');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    background-blend-mode: overlay;
    background-color: rgba(0,0,0,0.55);

    animation: bgMove 18s ease-in-out infinite alternate;
    backdrop-filter: blur(4px);
}

/* 🔥 Background Animation */
@keyframes bgMove {
    0% { background-position: center; filter: brightness(0.85); }
    50% { background-position: right; filter: brightness(1); }
    100% { background-position: left; filter: brightness(0.9); }
}

/* Align login card */
.login-container {
    margin-top: 120px;
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.login-card {
    background: rgba(255, 255, 255, 0.90);
    width: 100%;
    max-width: 380px;
    padding: 32px;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    animation: fadeIn 1.2s ease;
}

/* Fade animation */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
}

/* Heading */
.login-card h2 {
    text-align: center;
    margin-bottom: 22px;
    color: #222;
    font-weight: 700;
}

/* Inputs */
.login-card input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #bbb;
    font-size: 15px;
    background: rgba(255,255,255,0.95);
}

.login-card input:focus {
    outline: none;
    border-color: #4CAF50;
}

/* Button */
.login-card button {
    width: 100%;
    padding: 12px;
    margin-top: 18px;
    background: #4CAF50;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 17px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 600;
}

.login-card button:hover {
    background: #43a047;
    transform: scale(1.05);
}

/* Footer text */
.login-footer {
    text-align: center;
    margin-top: 15px;
    font-size: 17px;
    color: white;
}

.login-footer a {
    color: #4CAF50;
    text-decoration: none;
    font-weight: bold;
}

</style>

<div class="login-container">
    <div class="login-card">
        <h2>Login</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="login-footer">
            Don’t have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </div>
    </div>
</div>

{% endblock %}
