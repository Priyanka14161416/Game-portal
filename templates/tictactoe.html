{% extends "game_base.html" %}
{% block content %}

<h2 style="text-align:center;">❌⭕ Tic Tac Toe</h2>

<!-- 🎯 Animated Countdown Overlay -->
<div id="countdownOverlay">
    <div id="countdownCircle">3</div>
</div>

<div id="status" style="text-align:center;font-size:20px;margin:15px;"></div>

<div class="board">
    {% for i in range(9) %}
    <div class="cell" onclick="play({{ i }})"></div>
    {% endfor %}
</div>

<form method="POST" style="text-align:center;margin-top:20px;">
    <input type="hidden" name="score" id="score">
    <button class="btn">Save Score</button>
</form>

<style>

/* ===== Countdown Overlay ===== */
#countdownOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

#countdownCircle{
    width:100px;
    height:100px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    color:white;
    background:linear-gradient(45deg,#595bb0,#604f91,#363176,#5433ff);
    background-size:300% 300%;
    animation:zoom 1s infinite, gradientMove 3s infinite linear;
    box-shadow:0 0 30px rgba(255,255,255,0.6);
}

/* Animations */
@keyframes zoom{
    0%{transform:scale(0.8);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== Game Board ===== */
.board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 12px;
    justify-content: center;
    margin-top:20px;
}

.cell {
    width: 110px;
    height: 110px;
    background: #f4f6f9;
    font-size: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
}

.cell:hover {
    background: #e2e6ea;
    transform: scale(1.05);
}

.btn{
    padding:8px 20px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
}

</style>

<script>

let board = Array(9).fill("");
let current = "X";
let gameOver = false;
let gameStarted = false;

/* ===== Countdown Logic ===== */
let count = 3;
const countdownEl = document.getElementById("countdownCircle");
const overlay = document.getElementById("countdownOverlay");

const countdownTimer = setInterval(()=>{
    count--;

    if(count > 0){
        countdownEl.innerText = count;
        countdownEl.style.filter = "hue-rotate("+(count*120)+"deg)";
    }else if(count === 0){
        countdownEl.innerText = "GO!";
        countdownEl.style.filter = "hue-rotate(300deg)";
    }else{
        clearInterval(countdownTimer);
        overlay.style.display = "none";
        gameStarted = true;
        document.getElementById("status").innerText = `Turn: ${current}`;
    }
},1000);

/* ===== Game Logic ===== */
function play(i){
    if(!gameStarted) return;
    if(board[i] || gameOver) return;

    board[i] = current;
    document.getElementsByClassName("cell")[i].innerText = current;

    if(checkWin()){
        document.getElementById("status").innerText = `🎉 ${current} Wins!`;
        document.getElementById("score").value = 20;
        gameOver = true;
        return;
    }

    if(board.every(cell => cell !== "")){
        document.getElementById("status").innerText = "🤝 Draw!";
        document.getElementById("score").value = 10;
        gameOver = true;
        return;
    }

    current = current === "X" ? "O" : "X";
    document.getElementById("status").innerText = `Turn: ${current}`;
}

function checkWin(){
    const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    return wins.some(combo => 
        combo.every(i => board[i] === current)
    );
}

</script>

{% endblock %}
