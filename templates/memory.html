{% extends "game_base.html" %}
{% block content %}

<div class="memory-wrapper">

    <h2>🧠 Memory Match Game</h2>

    <!-- Colorful Animated Countdown -->
    <div id="countdownBox" class="countdown-box">
        <span id="countdown">3</span>
    </div>

    <p class="timer">⏱ Time: <span id="time">0</span> sec</p>

    <div class="grid" id="grid"></div>

    <form method="POST" class="score-form">
        <input type="hidden" name="score" id="score">
        <input type="hidden" name="time" id="time_taken">
        <button type="submit">💾 Save Score</button>
    </form>

</div>

<style>
.memory-wrapper{
    max-width:750px;
    margin:30px auto;
    padding:25px;
    background:#ffffff;
    border-radius:14px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
    font-family:Arial, sans-serif;
}

/* 🌈 COUNTDOWN */
.countdown-box{
    width:100px;
    height:100px;
    margin:15px auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    color:white;
    background:linear-gradient(45deg,#6b5eb3,#554e7c,#9d9fc8,#3b36be);
    background-size:300% 300%;
    animation:zoom 1s ease-in-out infinite,
              gradientMove 4s linear infinite;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

@keyframes zoom{
    0%{transform:scale(0.8);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.timer{
    font-size:18px;
    margin-bottom:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4,100px);
    gap:15px;
    justify-content:center;
    margin:20px auto;
    perspective:1000px;
}

/* 🎨 NEW CARD STYLE */
.card{
    width:100px;
    height:100px;
    border-radius:25px; /* shape changed */
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.6s ease;
    cursor:pointer;
}

/* card inner sides */
.card-face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:25px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
    color:white;
    backface-visibility:hidden;
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

/* Front */
.card-front{
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* Back */
.card-back{
    background:linear-gradient(135deg,#ff512f,#dd2476);
    transform:rotateY(180deg);
}

/* Flip Animation */
.card.flipped{
    transform:rotateY(180deg);
}

/* Hover Effect */
.card:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px rgba(118,75,162,0.6);
}

/* Match Animation */
.card.matched{
    animation:matchPop 0.5s ease;
}

@keyframes matchPop{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* Button */
.score-form button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#2a5298;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}
.score-form button:hover{
    background:#1e3c72;
}
</style>

<script>
let cards=[1,1,2,2,3,3,4,4];
cards.sort(()=>0.5-Math.random());

let grid=document.getElementById("grid");
let first=null,second=null,matched=0,time=0;
let gameStarted=false;
let timerInterval;

/* COUNTDOWN */
let countdown=3;
let countdownEl=document.getElementById("countdown");
let countdownBox=document.getElementById("countdownBox");

let countdownInterval=setInterval(()=>{
    if(countdown>0){
        countdownEl.innerText=countdown;
        countdownBox.style.filter="hue-rotate("+(countdown*120)+"deg)";
        countdown--;
    }
    else if(countdown===0){
        countdownEl.innerText="GO!";
        countdown--;
        gameStarted=true;

        timerInterval=setInterval(()=>{
            document.getElementById("time").innerText=++time;
        },1000);
    }
    else{
        countdownBox.style.display="none";
        clearInterval(countdownInterval);
    }
},1000);

/* CREATE CARDS */
cards.forEach(v=>{
    let card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
        <div class="card-face card-front"></div>
        <div class="card-face card-back">${v}</div>
    `;

    card.onclick=()=>flip(card,v);
    grid.appendChild(card);
});

/* FLIP FUNCTION */
function flip(card,value){
    if(!gameStarted) return;
    if(card.classList.contains("flipped")) return;

    card.classList.add("flipped");

    if(!first){
        first={card,value};
    }
    else{
        second={card,value};

        if(first.value===second.value){
            first.card.classList.add("matched");
            second.card.classList.add("matched");
            matched++;
            first=second=null;

            if(matched===4){
                clearInterval(timerInterval);
                document.getElementById("score").value=100;
                document.getElementById("time_taken").value=time+" sec";
                setTimeout(()=>{
                    alert("🎉 Awesome! You Won!");
                },400);
            }
        }
        else{
            setTimeout(()=>{
                first.card.classList.remove("flipped");
                second.card.classList.remove("flipped");
                first=second=null;
            },800);
        }
    }
}
</script>

{% endblock %}
