{% extends 'base.html' %}
{% block content %}

<!-- GAMING FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Audiowide&display=swap" rel="stylesheet">

<style>

/* ===== FULL VIDEO BACKGROUND ===== */
.video-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
}

/* Dark overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(10,10,25,0.95));
    z-index:-2;
}

/* Animated light sweep */
.overlay::before{
    content:"";
    position:absolute;
    width:200%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(0,255,255,0.2), transparent);
    animation:lightMove 6s linear infinite;
}

@keyframes lightMove{
    from{transform:translateX(-100%);}
    to{transform:translateX(100%);}
}

/* ===== DASHBOARD CONTENT ===== */
.dashboard-container{
    max-width:1000px;
    margin:80px auto;
    text-align:center;
    color:white;
}

/* ===== MAIN TITLE (PRO GAMING STYLE) ===== */
.dashboard-container h1{
    font-family:'Audiowide',cursive;
    font-size:52px;
    margin-bottom:60px;
    letter-spacing:5px;
    text-transform:uppercase;
    background:linear-gradient(90deg,#d05258,#c0dae1,#e0989f);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shineText 4s linear infinite;
   
}

@keyframes shineText{
    to{background-position:200% center;}
}

/* ===== CARDS ===== */
.score-cards{
    display:flex;
    flex-wrap:wrap;
    gap:40px;
    justify-content:center;
}

.card{
    flex:1 1 250px;
    padding:40px;
    border-radius:20px;
    background:rgba(0,0,0,0.65);
    border:2px solid rgba(0,255,255,0.6);
   
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.07);
    box-shadow:0 0 60px rgb(104, 198, 206);
}

/* ===== GAME TITLE TEXT ===== */
.card h3{
    font-family:'Orbitron',sans-serif;
    font-size:24px;
    letter-spacing:3px;
    margin-bottom:20px;
    text-transform:uppercase;
    color:white;
    
}

/* ===== SCORE TEXT STYLE ===== */
.card p{
    font-family:'Orbitron',sans-serif;
    font-size:42px;
    font-weight:900;
    letter-spacing:4px;
    color:#00f7ff;
    
    animation:pulseScore 1.5s infinite alternate;
}

@keyframes pulseScore{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

</style>

<!-- Gaming Video Background -->
<video autoplay muted loop class="video-bg">
    <source src="https://cdn.coverr.co/videos/coverr-gamer-playing-video-game-1607/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="dashboard-container">
    <h1>WELCOME, {{ user.username }} 👑</h1>

    <div class="score-cards">
        <div class="card">
            <h3>🎮 Tic Tac Toe</h3>
            <p>{{ user.tictactoe_score }}</p>
        </div>

        <div class="card">
            <h3>🧩 Sudoku</h3>
            <p>{{ user.sudoku_score }}</p>
        </div>

        <div class="card">
            <h3>🧠 Memory Game</h3>
            <p>{{ user.memory_score }}</p>
        </div>
    </div>
</div>

{% endblock %}
