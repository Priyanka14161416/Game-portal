<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(120deg,#1e3c72,#2a5298);
            color:white;
        }
        header{
            padding:15px 30px;
            background:rgba(0,0,0,0.4);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        header a{
            color:white;
            text-decoration:none;
            margin-left:15px;
            font-weight:500;
        }
        .container{
            max-width:1000px;
            margin:40px auto;
            background:white;
            color:#333;
            border-radius:10px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }
        h2{
            text-align:center;
            margin-bottom:20px;
        }
        .btn{
            padding:10px 22px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            background:#2a5298;
            color:white;
            font-size:16px;
        }
        .btn:hover{
            background:#1e3c72;
        }
    </style>
</head>
<body>

<header>
    <h3>🎮 Game Portal</h3>
    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </nav>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
